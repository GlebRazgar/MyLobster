<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Payment success</title>
<style>body{font-family:Inter,Arial;background:#0b0f1a;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh}.card{background:#111827;border:1px solid #2a3242;border-radius:12px;padding:20px;max-width:460px}</style>
</head><body><div class="card"><h2>Finalizing your subscription…</h2><p id="msg">Please wait.</p></div>
<script>
(async()=>{
 const q=new URLSearchParams(location.search); const sessionId=q.get('session_id');
 if(!sessionId){document.getElementById('msg').textContent='Missing session id.';return;}
 const r=await fetch('/api/payments/confirm-session',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sessionId})});
 const d=await r.json();
 if(!r.ok){document.getElementById('msg').textContent=d.error||'Could not confirm payment';return;}
 location.href='/dashboard';
})();
</script></body></html>
