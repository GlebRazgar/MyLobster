<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password • YourClaw</title>
  <style>
    body{font-family:Inter,system-ui,Arial;background:#050810;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
    .card{width:min(460px,92vw);background:#0a0f1a;border:1px solid #22304a;border-radius:16px;padding:24px}
    h1{margin:0 0 12px}.muted{color:#9ca3af}
    input{width:100%;padding:12px;border-radius:10px;border:1px solid #374151;background:#0f172a;color:#fff;margin:8px 0}
    button{width:100%;padding:12px;border:0;border-radius:10px;background:#ef4444;color:white;font-weight:700;cursor:pointer;margin-top:8px}
    .err{color:#fca5a5;min-height:18px;font-size:13px}
    .ok{color:#86efac;min-height:18px;font-size:13px}
  </style>
</head>
<body>
  <div class="card">
    <h1>Set a new password</h1>
    <p class="muted">Use at least 8 characters.</p>
    <input type="password" id="p1" placeholder="New password" minlength="8" />
    <input type="password" id="p2" placeholder="Confirm new password" minlength="8" />
    <button id="btn">Reset password</button>
    <div class="err" id="err"></div>
    <div class="ok" id="ok"></div>
  </div>
<script>
const q=new URLSearchParams(location.search);
const token=q.get('token')||'';
const email=q.get('email')||'';

async function run(){
  const err=document.getElementById('err');
  const ok=document.getElementById('ok');
  err.textContent=''; ok.textContent='';
  if(!token || !email){ err.textContent='Invalid reset link.'; return; }
  const p1=document.getElementById('p1').value;
  const p2=document.getElementById('p2').value;
  if(p1.length<8){ err.textContent='Password must be at least 8 chars.'; return; }
  if(p1!==p2){ err.textContent='Passwords do not match.'; return; }

  const r=await fetch('/api/auth/perform-password-reset',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,token,newPassword:p1})});
  const d=await r.json();
  if(!r.ok){ err.textContent=d.error||'Could not reset password'; return; }
  ok.textContent='Password updated. You can return and sign in.';
}

document.getElementById('btn').addEventListener('click',run);
</script>
</body>
</html>
